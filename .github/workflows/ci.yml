name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scoreboard
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: scoreboard/go.sum

      - name: Test
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

      - name: Binary integration test
        run: bash ./test-binary.sh

      - name: Coverage gate (99%)
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); if ($3 + 0 < 99) {printf("coverage %.1f%% is below threshold 99%%\n", $3 + 0); exit 1}}'

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Complexity gate (<7)
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -ignore "_test\\.go" -over 6 .

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
