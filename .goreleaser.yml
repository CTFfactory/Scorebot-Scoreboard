version: 2

project_name: scoreboard

before:
  hooks:
    - sh -c "cd scoreboard && go mod tidy"

builds:
  - id: scoreboard
    dir: scoreboard
    main: ./cmd/main.go
    binary: scoreboard
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/CTFfactory/Scorebot-Scoreboard/scoreboard.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: git
